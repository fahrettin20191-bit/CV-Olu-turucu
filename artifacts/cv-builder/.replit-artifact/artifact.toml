kind = "web"
previewPath = "/"
title = "ATS CV Oluşturucu"
version = "1.0.0"
id = "artifacts/cv-builder"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 3000

[services.development]
run = "pnpm run dev"

[services.production]
build = ["pnpm", "run", "build"]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
